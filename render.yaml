services:
  - type: web
    name: otakuvault-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter ./artifacts/api-server run build
    startCommand: pnpm --filter ./artifacts/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false